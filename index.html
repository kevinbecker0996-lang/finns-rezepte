<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Finns Rezepte</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>🍳 Finns Rezepte</h1>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="rezepte">Rezepte</button>
    <button class="tab-btn" data-tab="einkaufsliste">Einkaufsliste</button>
    <button class="tab-btn" data-tab="meine-rezepte">Meine Rezepte</button>
  </div>

  <div id="rezepte" class="tab-content active">
    <h2>Rezepte finden</h2>
    <p>Gib deine Lebensmittel ein, um passende Rezepte zu finden:</p>
    
    <div class="input-group">
      <input type="text" id="zutatInput" placeholder="z.B. Tomaten, Käse, Nudeln...">
      <button onclick="addZutat()" class="primary-btn">+ Zutat hinzufügen</button>
    </div>

    <div id="zutatenListe" class="zutaten-liste"></div>
    
    <button onclick="findRecipes()" class="primary-btn">🔍 Rezepte suchen</button>
    
    <div id="rezeptResults"></div>
  </div>

  <div id="einkaufsliste" class="tab-content hidden">
    <h2>Einkaufsliste</h2>
    <div class="input-group">
      <input type="text" id="einkaufInput" placeholder="Artikel hinzufügen...">
      <button onclick="addEinkauf()" class="primary-btn">+ Hinzufügen</button>
    </div>
    
    <div id="einkaufListe" class="einkauf-liste"></div>
    
    <button onclick="clearEinkauf()" class="danger-btn">🗑️ Liste leeren</button>
  </div>

  <div id="meine-rezepte" class="tab-content hidden">
    <h2>Neues Rezept erstellen</h2>
    
    <div class="form-group">
      <label>Rezeptname:</label>
      <input type="text" id="rezeptName" placeholder="z.B. Spaghetti Carbonara">
    </div>

    <div class="form-group">
      <label>Zutaten (durch Komma trennen):</label>
      <input type="text" id="rezeptZutaten" placeholder="z.B. Nudeln, Eier, Bacon, Parmesan">
    </div>

    <div class="form-group">
      <label>Zubereitungsanleitung:</label>
      <textarea id="rezeptAnleitung" placeholder="Schritt für Schritt..." rows="5"></textarea>
    </div>

    <div class="form-group">
      <label>Zubereitungszeit (Minuten):</label>
      <input type="number" id="rezeptZeit" placeholder="30">
    </div>

    <button onclick="saveRecipe()" class="primary-btn">💾 Rezept speichern</button>
    
    <h3 style="margin-top: 30px;">Meine gespeicherten Rezepte:</h3>
    <div id="mineRecipesList"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
